<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Каталог</title>
  <link href="{{ url_for('static', filename='bootstrap.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('index') }}">Каталог</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('stats') }}">Статистика</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('graph') }}">Граф связей</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('import_files') }}">Импорт</a></li>
      </ul>
      <form class="nav-center d-flex search-form" role="search" action="{{ url_for('index') }}">
        <input class="form-control me-2" type="search" name="q" placeholder="Поиск (названия, авторы, теги...)" value="{{ q or '' }}">
        <button class="btn btn-outline-light" type="submit">Найти</button>
      </form>
      <div class="nav-right d-flex align-items-center">
        <div class="nav-actions d-flex align-items-center">
          <button id="themeToggle" type="button" title="Переключить тему" aria-label="Переключить тему">☀️</button>
          <a class="btn btn-success btn-sm" href="{{ url_for('settings') }}">Настройки</a>
        </div>
        <span class="author-mark ms-2">Made by Ryltsin I.A.</span>
      </div>
    </div>
  </div>
</nav>

<main class="container page">
  {% block content %}{% endblock %}
</main>

<script>
// Сохраняем выбранную тему в localStorage
document.addEventListener('DOMContentLoaded', ()=>{
  try{
    const saved = localStorage.getItem('theme');
    if(saved) document.documentElement.setAttribute('data-theme', saved);
  }catch(e){ /* ignore */ }
});
</script>

<script>
// Переключение темы
document.addEventListener('DOMContentLoaded', ()=>{
  const btn = document.getElementById('themeToggle');
  if(!btn) return;
  const apply = (t)=>{ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
  const current = document.documentElement.getAttribute('data-theme') || localStorage.getItem('theme') || 'light';
  btn.textContent = current === 'dark' ? '🌙' : '☀️';
  btn.addEventListener('click', ()=>{
    const next = (document.documentElement.getAttribute('data-theme') === 'dark') ? 'light' : 'dark';
    apply(next);
    btn.textContent = next === 'dark' ? '🌙' : '☀️';
  });
});
</script>

<script>
// Бутстраповский тогглер меню
document.addEventListener('DOMContentLoaded', ()=>{
  const toggler = document.querySelector('.navbar-toggler');
  const target = document.getElementById('nav');
  if (!toggler || !target) return;
  toggler.addEventListener('click', ()=> target.classList.toggle('show'));
});
</script>

</body>
</html>
