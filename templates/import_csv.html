{% extends "base.html" %}
{% block content %}
<h2>Импорт из CSV</h2>
<form method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <input type="file" name="file" class="form-control" required accept=".csv">
    </div>
    <button type="submit" class="btn btn-primary">Импортировать</button>
</form>
<p class="mt-3 text-muted">CSV должен содержать столбцы: title, author, year, material_type, filename, keywords, tags.</p>
{% endblock %}
