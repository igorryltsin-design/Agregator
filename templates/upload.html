{% extends "base.html" %}
{% block content %}
<h2>Загрузка файла</h2>
<div class="alert alert-info">Для импорта нескольких файлов и папок используйте страницу <a href="{{ url_for('import_files') }}">Импорт</a>.</div>
<form method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <input type="file" name="file" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Загрузить</button>
</form>
{% endblock %}
